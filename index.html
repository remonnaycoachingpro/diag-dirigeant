<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Matthieu Remonnay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.5; padding: 20px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 25px; max-width: 500px; margin: 40px auto; text-align: center; }
        h1 { color: white; margin-bottom: 20px; font-size: 22px; }
        .btn { background: #3b82f6; color: white; padding: 15px 25px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; width: 100%; text-decoration: none; display: inline-block; }
        .option { background: #0f172a; border: 1px solid #334155; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; text-align: left; }
        .option:hover { border-color: #3b82f6; }
        #quiz, #result { display: none; }
        #quiz.active, #result.active { display: block; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="card active" id="intro">
        <h1>Prêt pour votre Diag Flash ?</h1>
        <p style="margin-bottom:20px">Évaluez la solidité de votre entreprise en 10 questions.</p>
        <button class="btn" onclick="start()">Démarrer le test</button>
    </div>

    <div class="card" id="quiz">
        <div id="question-cont"></div>
    </div>

    <div class="card" id="result">
        <h1>Votre Score : <span id="score-val">0</span>/30</h1>
        <form id="f" action="https://formspree.io/f/mgorvroz" method="POST">
            <input type="email" name="email" placeholder="Votre email pro" required>
            <input type="hidden" name="score" id="h-score">
            <button type="submit" class="btn" id="s-btn">Recevoir mon analyse</button>
        </form>
        <p id="msg" style="display:none; color:#4ade80; margin-top:20px">✅ Envoyé ! Je vous recontacte vite.</p>
    </div>

    <script>
        const qs = [
            "Connaissez-vous votre seuil de rentabilité ?",
            "Avez-vous de la tréso à 6 mois ?",
            "Votre acquisition client est-elle régulière ?",
            "Suivez-vous votre taux de conversion ?",
            "Vos collaborateurs ont-ils des objectifs clairs ?",
            "Arrivez-vous à déléguer ?",
            "Vos process sont-ils écrits ?",
            "Subissez-vous des urgences ?",
            "Avez-vous un plan à 3 ans ?",
            "Prenez-vous du temps stratégique ?"
        ];
        let idx = 0; let total = 0;
        function start() { document.getElementById('intro').classList.remove('active'); document.getElementById('quiz').classList.add('active'); showQ(); }
        function showQ() {
            document.getElementById('question-cont').innerHTML = `<h2>Question ${idx+1}/10</h2><p style="margin:15px 0">${qs[idx]}</p>
                <div class="option" onclick="next(3)">Oui, tout à fait</div>
                <div class="option" onclick="next(2)">Moyennement</div>
                <div class="option" onclick="next(1)">Pas du tout</div>`;
        }
        function next(v) {
            total += v; idx++;
            if(idx < 10) showQ();
            else { 
                document.getElementById('quiz').classList.remove('active'); 
                document.getElementById('result').classList.add('active');
                document.getElementById('score-val').innerText = total;
                document.getElementById('h-score').value = total + "/30";
            }
        }
        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const b = document.getElementById('s-btn'); b.disabled = true; b.innerText = "Envoi...";
            await fetch(e.target.action, { method: 'POST', body: new FormData(e.target), headers: {'Accept': 'application/json'} });
            document.getElementById('f').style.display = 'none';
            document.getElementById('msg').style.display = 'block';
        }
    </script>
</body>
</html>
