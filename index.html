<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diag Flash Dirigeant — Matthieu Remonnay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); padding: 60px 20px 40px; text-align: center; position: relative; overflow: hidden; }
        .hero-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
        .badge { display: inline-block; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 24px; }
        .hero h1 { font-size: clamp(28px, 5vw, 44px); font-weight: 800; line-height: 1.2; margin-bottom: 16px; background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero p { font-size: 17px; color: #94a3b8; line-height: 1.6; max-width: 540px; margin: 0 auto 28px; }
        .container { max-width: 680px; margin: 0 auto; padding: 20px; }
        .progress-bar-container { background: #1e293b; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; border: 1px solid #334155; position: sticky; top: 10px; z-index: 100; backdrop-filter: blur(10px); }
        .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .progress-label { font-size: 13px; font-weight: 600; color: #94a3b8; }
        .progress-count { font-size: 13px; font-weight: 700; color: #60a5fa; }
        .progress-track { width: 100%; height: 6px; background: #334155; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 10px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
        .question-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 32px 28px; margin-bottom: 20px; display: none; animation: fadeIn 0.4s ease; }
        .question-card.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .pillar-tag { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
        .pillar-finance { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.25); }
        .pillar-commercial { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.25); }
        .pillar-management { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.25); }
        .pillar-orga { background: rgba(251, 146, 60, 0.15); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.25); }
        .pillar-strategie { background: rgba(236, 72, 153, 0.15); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.25); }
        .question-card h2 { font-size: 19px; font-weight: 700; color: #f1f5f9; line-height: 1.4; margin-bottom: 24px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; cursor: pointer; transition: all 0.25s ease; font-size: 15px; color: #cbd5e1; }
        .option:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .option.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: #f1f5f9; }
        .option-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #475569; display: flex; align-items: center; justify-content: center; }
        .option.selected .option-dot { border-color: #3b82f6; background: #3b82f6; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 24px; }
        .btn { padding: 12px 28px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s ease; border: none; }
        .btn-back { background: transparent; border: 1px solid #475569; color: #94a3b8; }
        .btn-next { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; margin-left: auto; }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
        .results-container { display: none; }
        .results-container.active { display: block; animation: fadeIn 0.6s ease; }
        .score-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 40px 28px; text-align: center; margin-bottom: 24px; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; border: 3px solid #3b82f6; }
        .score-number { font-size: 36px; font-weight: 800; }
        .pillar-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .pillar-bar-bg { flex: 1; height: 8px; background: #0f172a; border-radius: 10px; overflow: hidden; }
        .pillar-bar-fill { height: 100%; background: #3b82f6; width: 0; transition: width 1s ease; }
        .footer { text-align: center; padding: 40px 20px; color: #64748b; font-size: 13px; border-top: 1px solid #1e293b; }
        .footer a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <div class="badge">⚡ Diag Flash Dirigeant</div>
            <h1>Votre entreprise est-elle vraiment solide ?</h1>
            <p>Identifiez en 2 minutes les piliers qui freinent votre croissance.</p>
        </div>
    </div>

    <div class="container">
        <div class="progress-bar-container" id="progressContainer">
            <div class="progress-info">
                <span class="progress-label">Analyse de performance
