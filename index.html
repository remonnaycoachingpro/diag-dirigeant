<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diag Flash Dirigeant — Matthieu Remonnay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.5; overflow-x: hidden; }

        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 40px 20px; text-align: center; }
        .badge { display: inline-block; background: rgba(59,130,246,0.1); border: 1px solid #3b82f6; color: #60a5fa; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }
        h1 { font-size: 28px; font-weight: 800; color: white; margin-bottom: 10px; }
        .hero-sub { color: #94a3b8; font-size: 15px; max-width: 440px; margin: 0 auto; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        .progress-bar-container { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; position: sticky; top: 10px; z-index: 100; }
        .progress-info { display: flex; justify-content: space-between; font-size: 12px; }
        .progress-track { width: 100%; height: 8px; background: #334155; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 10%; transition: width 0.4s ease; border-radius: 10px; }

        .question-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 25px; display: none; margin-bottom: 30px; }
        .question-card.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .pillar-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; display: inline-block; padding: 4px 10px; border-radius: 50px; }
        .tag-finance { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
        .tag-commercial { background: rgba(96,165,250,0.1); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
        .tag-management { background: rgba(192,132,252,0.1); color: #c084fc; border: 1px solid rgba(192,132,252,0.25); }
        .tag-orga { background: rgba(251,146,60,0.1); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
        .tag-vision { background: rgba(244,114,182,0.1); color: #f472b6; border: 1px solid rgba(244,114,182,0.25); }

        h2 { font-size: 19px; color: white; margin-bottom: 20px; line-height: 1.4; }

        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 14px 16px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; cursor: pointer; color: #cbd5e1; font-weight: 500; font-size: 15px; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; }
        .option:hover { border-color: #3b82f6; background: rgba(59,130,246,0.04); }
        .option.selected { border-color: #3b82f6; background: rgba(59,130,246,0.1); color: white; }
        .option-dot { width: 18px; height: 18px; min-width: 18px; border-radius: 50%; border: 2px solid #475569; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .option.selected .option-dot { border-color: #3b82f6; background: #3b82f6; }
        .option.selected .option-dot::after { content: '✓'; color: white; font-size: 10px; font-weight: 700; }

        .nav-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s ease; }
        .btn-next { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.25); }
        .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-back { background: transparent; color: #94a3b8; border: 1px solid #475569; }

        /* RESULTS */
        .results-container { display: none; }
        .results-container.active { display: block; animation: fadeIn 0.5s ease; }

        .score-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 35px 25px; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; }
        .score-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .score-card.lvl-green::before { background: #22c55e; }
        .score-card.lvl-orange::before { background: #f59e0b; }
        .score-card.lvl-red::before { background: #ef4444; }

        .score-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; border: 3px solid #334155; }
        .score-num { font-size: 32px; font-weight: 800; }
        
        .pillar-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .pillar-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
        .pillar-row:last-child { border-bottom: none; }
        .pillar-name { font-size: 13px; font-weight: 600; min-width: 100px; }
        .pillar-bar-bg { flex: 1; height: 8px; background: #334155; border-radius: 8px; margin: 0 12px; overflow: hidden
