<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diag Performance 2026 — Déclic Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c1220; --surface: #131c2e; --card: #192236;
            --border: #253350; --accent: #4f7ef7; --success: #34d399;
            --text: #e8edf5; --muted: #6b7fa3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            background-image: radial-gradient(circle at top right, rgba(79,126,247,0.1), transparent);
            line-height: 1.5; padding: 20px;
        }
        .container { max-width: 550px; margin: 0 auto; }
        
        .header { text-align: center; padding: 30px 0; }
        .brand { font-family: 'DM Serif Display', serif; font-size: 28px; }
        .brand span { color: var(--accent); }

        .prog-wrap { background: var(--surface); padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .prog-bar { height: 6px; background: var(--border); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }

        .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .q-card.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .pillar-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; display: block; }
        h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 20px; }

        .options { display: grid; gap: 12px; }
        .opt { background: var(--bg); border: 1.5px solid var(--border); padding: 16px; border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .opt:hover { border-color: var(--accent); }
        .opt.selected { background: rgba(79,126,247,0.1); border-color: var(--accent); }
        .opt-title { font-weight: 600; font-size: 15px; display: block; }
        .opt-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-top: 20px; font-family: inherit; }
        .btn-next { background: var(--accent); color: white; }
        .btn-next:disabled { opacity: 0.3; }

        /* Results */
        #results, #thanks-msg { display: none; }
        .score-circle { width: 110px; height: 110px; border-radius: 50%; border: 5px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .score-val { font-family: 'DM Serif Display', serif; font-size: 32px; }
        .score-max { font-size: 12px; color: var(--muted); }
        
        .pillar-row { display: flex; align-items: center; margin-bottom: 12px; font-size: 13px; }
        .p-name { width: 100px; color: var(--muted); }
        .p-bar { flex: 1; height: 6px; background: var(--border); border-radius: 10px; margin: 0 15px; overflow: hidden; }
        .p-fill { height: 100%; background: var(--accent); }

        input, textarea { width: 100%; padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 10px; font-family: inherit; }
        .btn-submit { background: var(--success); color: #0c1220; font-weight: 800; }
        .linkedin-btn { background: #0077b5; color: white; text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 10px; font-weight: 700; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand">Déclic <span>Pro</span></div>
        <p style="font-size: 12px; color: var(--muted); margin-top: 5px;">Analyse Performance 2026</p>
    </div>

    <div id="prog-area" class="prog-wrap">
        <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--muted);">
            <span>PROGRESSION</span>
            <span id="prog-txt">1 / 11</span>
        </div>
        <div class="prog-bar"><div id="prog-fill" class="prog-fill"></div></div>
    </div>

    <div id="quiz-container"></div>

    <div id="results" class="q-card">
        <div class="score-circle">
            <span class="score-val" id="final-score">0</span>
            <span class="score-max">sur 55</span>
        </div>
        <div id="pillar-details" style="margin-bottom: 25px;"></div>
        
        <div style="background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid var(--border);">
            <h3 style="margin-bottom: 10px; font-family: 'DM Serif Display';">Recevoir mon plan d'action</h3>
            <form id="diag-form" action="https://formspree.io/f/mgorvroz" method="POST">
                <input type="hidden" name="Score" id="form-total">
                <input type="text" name="Nom" placeholder="Votre nom" required>
                <input type="email" name="Email" placeholder="Email professionnel" required>
                <input type="tel" name="Tel" placeholder="Téléphone" required>
                <textarea name="Defi" placeholder="Votre défi prioritaire ?" rows="2"></textarea>
                <button type="submit" class="btn btn-submit">Réserver mon diagnostic (15 min) →</button>
            </form>
        </div>
    </div>

    <div id="thanks-msg" class="q-card" style="text-align:center; padding: 40px 20px;">
        <h2 style="color: var(--success);">Diagnostic Envoyé !</h2>
        <p style="margin-top: 15px;">Merci, nous avons bien reçu votre diagnostic. Votre synthèse complète vous sera envoyée sous 24h.</p>
        <a href="https://www.linkedin.com/in/matthieu-remonnay/" target="_blank" class="linkedin-btn">Suivre Matthieu sur LinkedIn</a>
    </div>
</div>

<script>
    const questions = [
        { p: "Global", q: "Le sentiment de solidité de votre entreprise ?", k: "glo", o: [
            {t: "Entreprise très solide", d: "Vision claire et rentabilité au rendez-vous.", v: 5},
            {t: "Solidité moyenne", d: "Des hauts et des bas, mais ça tient.", v: 3},
            {t: "Situation fragile", d: "Besoin urgent de sécuriser la structure.", v: 1}
        ]},
        { p: "Finance", q: "Maîtrisez-vous votre seuil de rentabilité ?", k: "fin", o: [
            {t: "Oui, précisément", d: "Je connais mon point mort chaque mois.", v: 5},
            {t: "Approximativement", d: "J'ai une idée globale mais sans outil de suivi.", v: 3},
            {t: "Pas du tout", d: "Je navigue sans visibilité réelle.", v: 1}
        ]},
        { p: "Finance", q: "Prévisionnel de trésorerie à 6 mois ?", k: "fin", o: [
            {t: "Anticipation totale", d: "J'ai une vision claire de mon cash futur.", v: 5},
            {t: "Vision courte", d: "Je regarde à 1 ou 2 mois maximum.", v: 3},
            {t: "Vue au jour le jour", d: "Je gère l'urgence bancaire.", v: 1}
        ]},
        { p: "Finance", q: "Flux de facturation et recouvrement ?", k: "fin", o: [
            {t: "Fluide et rapide", d: "Peu de retards de paiement.", v: 5},
            {t: "Quelques retards", d: "Le recouvrement me prend du temps.", v: 3},
            {t: "Problématique", d: "Les impayés pèsent sur ma trésorerie.", v: 1}
        ]},
        { p: "Commerce", q: "Flux régulier de prospects qualifiés ?", k: "com", o: [
            {t: "Pipeline prévisible", d: "Mes actions génèrent des leads constants.", v: 5},
            {t: "Flux irrégulier", d: "C'est un peu les montagnes russes.", v: 3},
            {t: "Bouche-à-oreille subi", d: "Je ne maîtrise pas mon acquisition.", v: 1}
        ]},
        { p: "Commerce", q: "Suivi du taux de conversion ?", k: "com", o: [
            {t: "Pilotage précis", d: "Je sais combien me coûte un client.", v: 5},
            {t: "Suivi partiel", d: "Je connais mes ventes mais pas le 'pourquoi'.", v: 3},
            {t: "Aucune mesure", d: "Je ne sais pas ce qui performe.", v: 1}
        ]},
        { p: "Management", q: "Autonomie de l'équipe ?", k: "man", o: [
            {t: "Indépendance totale", d: "L'entreprise tourne sans moi.", v: 5},
            {t: "Semi-autonomie", d: "Ils ont besoin de moi pour décider.", v: 3},
            {t: "Dépendance forte", d: "Si je pars, tout s'arrête.", v: 1}
        ]},
        { p: "Management", q: "Capacité à déléguer ?", k: "man", o: [
            {t: "Délégation réelle", d: "Je fais confiance et je libère du temps.", v: 5},
            {t: "Délégation contrôlée", d: "Je vérifie tout derrière eux.", v: 3},
            {t: "Je fais tout", d: "Déléguer me prend plus de temps.", v: 1}
        ]},
        { p: "Gestion des Process", q: "Processus écrits et partagés ?", k: "org", o: [
            {t: "Bible opérationnelle", d: "Tout est documenté et accessible.", v: 5},
            {t: "En tête seulement", d: "Quelques notes, mais rien de structuré.", v: 3},
            {t: "Zéro process", d: "Chacun fait à sa manière.", v: 1}
        ]},
        { p: "Gestion des Process", q: "Gestion des urgences ?", k: "org", o: [
            {t: "Quotidien serein", d: "Je maîtrise mon agenda.", v: 5},
            {t: "Urgences fréquentes", d: "Je finis souvent mes journées épuisé.", v: 3},
            {t: "Pompier permanent", d: "Je ne fais que gérer des crises.", v: 1}
        ]},
        { p: "Stratégie", q: "Vision chiffrée à 12 mois ?", k: "str", o: [
            {t: "Cap clair", d: "Objectifs précis et partagés.", v: 5},
            {t: "Idée globale", d: "Je sais où je vais mais sans plan écrit.", v: 3},
            {t: "Flou total", d: "On verra bien à la fin de l'année.", v: 1}
        ]}
    ];

    let current = 0;
    let scores = {};

    function init() {
        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = `q-card ${i===0?'active':''}`;
            div.id = `q-${i}`;
            div.innerHTML = `
                <span class="pillar-badge">${q.p}</span>
                <h2>${q.q}</h2>
                <div class="options">
                    ${q.o.map((opt, idx) => `
                        <div class="opt" onclick="set(${i}, ${opt.v}, '${q.k}')">
                            <span class="opt-title">${opt.t}</span>
                            <span class="opt-desc">${opt.d}</span>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-next" id="b-${i}" disabled onclick="step()">Continuer →</button>
            `;
            container.appendChild(div);
        });
    }

    window.set = (i, v, k) => {
        scores[i] = {v, k};
        const card = document.getElementById(`q-${i}`);
        card.querySelectorAll('.opt').forEach((o, idx) => {
            o.classList.toggle('selected', questions[i].o[idx].v === v);
        });
        document.getElementById(`b-${i}`).disabled = false;
    };

    window.step = () => {
        if (current === questions.length - 1) return showResults();
        document.getElementById(`q-${current}`).classList.remove('active');
        current++;
        document.getElementById(`q-${current}`).classList.add('active');
        updateProg();
    };

    function updateProg() {
        const pct = ((current + 1) / questions.length) * 100;
        document.getElementById('prog-fill').style.width = pct + '%';
        document.getElementById('prog-txt').innerText = `${current + 1} / ${questions.length}`;
    }

    function showResults() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('prog-area').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        
        let total = 0;
        let pils = { glo:0, fin:0, com:0, man:0, org:0, str:0 };
        let maxs = { glo:5, fin:15, com:10, man:10, org:10, str:5 };

        Object.values(scores).forEach(s => {
            total += s.v;
            pils[s.k] += s.v;
        });

        document.getElementById('final-score').innerText = total;
        const pilNames = { glo:"Vision", fin:"Finance", com:"Commerce", man:"Management", org:"Process", str:"Stratégie" };
        let html = "";
        for (let k in pils) {
            let pct = (pils[k] / maxs[k]) * 100;
            html += `
                <div class="pillar-row">
                    <span class="p-name">${pilNames[k]}</span>
                    <div class="p-bar"><div class="p-fill" style="width:${pct}%"></div></div>
                    <span style="width:30px; text-align:right;">${pils[k]}</span>
                </div>`;
        }
        document.getElementById('pillar-details').innerHTML = html;
        document.getElementById('form-total').value = total + "/55";
    }

    document.getElementById('diag-form').onsubmit = async (e) => {
        e.preventDefault();
        const f = e.target;
        await fetch(f.action, { method: 'POST', body: new FormData(f), headers: {'Accept': 'application/json'} });
        document.getElementById('results').style.display = 'none';
        document.getElementById('thanks-msg').style.display = 'block';
    };

    init();
</script>

</body>
</html>
